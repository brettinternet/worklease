name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Tag/version to validate without publishing a release
        required: true
        default: v0.1.0
        type: string


permissions:
  contents: read

jobs:
  python-assets:
    name: Build Python assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - name: Sync locked environment
        run: mise run sync
      - name: Verify package version matches tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          expected=${RELEASE_TAG#v}
          actual=$(mise exec uv -- uv run python -c 'import importlib.metadata; print(importlib.metadata.version("worklease"))')
          test "$actual" = "$expected"
      - name: Build wheel and sdist
        run: |
          mkdir -p dist/release
          mise exec uv -- uv build --no-build-isolation --out-dir dist/release
          mise exec uv -- uv build --project packages/worklease-source-sdk \
            --no-build-isolation --out-dir dist/release
      - name: Verify Python package data
        run: |
          for artifact in dist/release/worklease-*.whl dist/release/worklease-*.tar.gz; do
            mise exec uv -- uv run python scripts/release_artifacts.py \
              verify-package --artifact "$artifact" --kind python
          done
          for artifact in dist/release/worklease_source_sdk-*.whl dist/release/worklease_source_sdk-*.tar.gz; do
            mise exec uv -- uv run python scripts/release_artifacts.py \
              verify-package --artifact "$artifact" --kind sdk
          done
      - name: Upload Python assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-python
          path: dist/release/*
          if-no-files-found: error

  native-assets:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }} executable
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            asset_arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            asset_arch: arm64
          - os: macos-15-intel
            platform: macos
            arch: x86_64
            asset_arch: x64
          - os: macos-14
            platform: macos
            arch: arm64
            asset_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - name: Sync locked environment
        run: mise run sync
      - name: Build one-file executable with package metadata
        run: |
          mise exec uv -- uv run --locked --group release pyinstaller \
            --clean --noconfirm --onefile \
            --name worklease \
            --copy-metadata worklease \
            --collect-submodules worklease.adapters \
            --collect-data worklease \
            src/worklease/__main__.py
      - name: Verify standalone package data
        run: |
          mise exec uv -- uv run python scripts/release_artifacts.py \
            verify-package --artifact dist/worklease --kind native
      - name: Smoke-test frozen version and adapter key
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        shell: bash
        run: |
          expected=${RELEASE_TAG#v}
          export EXPECTED_VERSION="$expected"
          dist/worklease --json --version > version.json
          python -c 'import json, os; p=json.load(open("version.json")); assert p["schemaVersion"] == 1 and p["operation"] == "version" and p["ok"] and p["version"] == os.environ["EXPECTED_VERSION"]'
          dist/worklease --json key --provider github --source example/repo --item 1 > key.json
          python -c 'import json; p=json.load(open("key.json")); assert p["schemaVersion"] == 1 and p["operation"] == "key" and p["ok"] and p["provider"] == "github"'
      - name: Package mise-compatible native archive
        env:
          ASSET_NAME: worklease-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}-${{ matrix.platform }}-${{ matrix.asset_arch }}.tar.gz
        run: |
          mise exec uv -- uv run python scripts/release_artifacts.py \
            package-native --executable dist/worklease --archive "dist/$ASSET_NAME"
      - name: Upload native asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-native-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/worklease-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}-${{ matrix.platform }}-${{ matrix.asset_arch }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs: [python-assets, native-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: true
      - name: Download all release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist/release
          merge-multiple: true
      - name: Generate and verify complete checksums
        run: |
          mise exec uv -- uv run python scripts/release_artifacts.py write --directory dist/release
          mise exec uv -- uv run python scripts/release_artifacts.py verify --directory dist/release
      - name: Publish tagged assets
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
