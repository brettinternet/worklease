[env]
_.python.venv = { path = ".venv", create = true }

[tools]
python = "3.14"
uv = "latest"
"npm:pyright" = "latest"
"npm:backlog.md" = "latest"

[settings]
disable_backends = ["pipx"]
pipx.uvx = true

[tasks]
sync = "uv sync --locked"
test = "uv run python -m unittest discover -s tests -v"
typecheck = "mise exec -- pyright"
build = "uv build"
install-release = "scripts/install-release.sh"
