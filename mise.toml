[env]
_.python.venv = { path = ".venv", create = true }

[tools]
python = "3.14"
uv = "latest"
"npm:pyright" = "latest"
"npm:backlog.md" = "latest"
lefthook = "latest"

[settings]
disable_backends = ["pipx"]
pipx.uvx = true

[tasks]
sync = "uv sync --locked"
cli = "uv run worklease"
test = "uv run python -m unittest discover -s tests -v"
typecheck = "pyright"
lint = "uv run ruff check ."
format = "uv run ruff format ."
format-check = "uv run ruff format --check ."
hooks-install = "lefthook install"
hooks = "lefthook run pre-commit"
build = "uv build --no-build-isolation"
install-release = "scripts/install-release.sh"
release-validate = "uv run python scripts/release_artifacts.py verify --directory dist/release"
